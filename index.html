<!DOCTYPE html>
<html>
<head>
    <title>Mood Music Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <div class="container">
        <h1>Mood-Based Music Recommender 🎵</h1>

        <form action="/recommend" method="POST">
            <input type="text" name="mood" placeholder="How are you feeling?" required>
            <button type="submit">Get Songs</button>
        </form>

        {% if tracks %}
        <div class="results">
            {% for track in tracks %}
                <div class="card">
                    <h3>{{ track.name }}</h3>
                    <p>{{ track.artist }}</p>
                    {% if track.preview %}
                        <audio controls src="{{ track.preview }}"></audio>
                    {% endif %}
                    <a href="{{ track.url }}" target="_blank">Open in Spotify</a>
                </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

</body>
</html>
